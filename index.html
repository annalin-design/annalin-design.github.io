h1.intro-text{

.intro-container{
  display: grid;
  grid-template-columns: 3fr 1fr;
  grid-gap: 2em 3em;
  width: 100%;
  max-width: 950px;
  margin: 0 auto;
  position: relative;
  padding-bottom:20px;
  padding-top:20px;
  grid-template-rows: auto repeat(auto-fill, 7%);
  grid-auto-flow: dense;
 

}

.intro{
  grid-row: span 1;
  grid-column: span 1;

}




/* ---- grid ---- */


/* clearfix */
.grid:after {
  content: '';
  display: block;
  clear: both;
}

/* ---- grid-item ---- */

.grid-sizer,
.grid-item {
  width: 46%;
  margin-bottom: 2%;
}

.gutter-sizer {
  width: 8%;
}

.grid-item {
  height: auto;
  float: left;
}

@media only screen and (max-width: 600px){

  .intro-container {
    display: grid;
    grid-template-columns: 1fr;
    grid-gap: 2em;
    grid-auto-rows: auto;

  }


h1.intro-text{

  line-height: 140%;
  
}


.grid-sizer,
.grid-item {
  width: 90%;
  margin-bottom: 2%;
  margin-left: 5%;
  margin-right: 5%;
}
.gutter-sizer {
  width: 0%;
}


}


</style>
